<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random 0/1</title>

<style>
:root {
    --box-size: 35px;
    --box-gap: 8px;
    --box-radius: 14px;

    --bg: linear-gradient(135deg, #0f172a, #020617);
    --glass: rgba(255,255,255,0.05);
    --primary: #22d3ee;
    --blue: #3b82f6;
    --pink: #ec4899;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container glass */
.container {
    backdrop-filter: blur(15px);
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h2 {
    color: var(--primary);
    margin-bottom: 20px;
    letter-spacing: 1px;
}

/* Slider */
.slider {
    width: 100%;
    height: 6px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    outline: none;
}

.slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--blue));
    cursor: pointer;
    box-shadow: 0 0 10px var(--primary);
}

.ratio-display {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    color: #cbd5f5;
}

/* Button */
.btn-random {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    background: linear-gradient(135deg, var(--primary), var(--blue));
    color: #020617;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 10px 25px rgba(34,211,238,0.3);
}

.btn-random:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(34,211,238,0.5);
}

.btn-random:active {
    transform: scale(0.96);
}

/* Result grid */
.result-container {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(6, auto);
    gap: var(--box-gap);
    justify-content: center;
}

/* Box */
.result-box {
    width: var(--box-size);
    height: var(--box-size);
    border-radius: var(--box-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.4rem;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

/* Hiệu ứng theo số */
.result-box.zero {
    color: #60a5fa;
    box-shadow: 0 0 10px rgba(96,165,250,0.6);
}

.result-box.one {
    color: yellow;
    box-shadow: 0 0 10px rgba(244,114,182,0.6);
}

/* Animation */
.pop {
    animation: pop 0.25s ease;
}
@keyframes pop {
    0% { transform: scale(0.8); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
    <h2>✨ Random 0 / 1</h2>

    <input type="range" min="0" max="6" value="3" class="slider" id="ratioSlider">

    <div class="ratio-display">
        <span> <b id="val0">3</b>  số 0</span>
        <span> <b id="val1">3</b>  số 1</span>
    </div>

    <button class="btn-random" onclick="generateRandom()">TẠO NGẪU NHIÊN</button>

    <div class="result-container">
        <div class="result-box"></div>
        <div class="result-box"></div>
        <div class="result-box"></div>
        <div class="result-box"></div>
        <div class="result-box"></div>
        <div class="result-box"></div>
    </div>
</div>

<script>
const slider = document.getElementById("ratioSlider");
const val0 = document.getElementById("val0");
const val1 = document.getElementById("val1");
const boxes = document.querySelectorAll(".result-box");

slider.oninput = function() {
    val0.innerText = 6 - this.value;
    val1.innerText = this.value;
}

function generateRandom() {
    const num1 = parseInt(slider.value);
    const num0 = 6 - num1;

    let pool = [];
    for (let i = 0; i < num0; i++) pool.push(0);
    for (let i = 0; i < num1; i++) pool.push(1);

    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    boxes.forEach((box, i) => {
        box.innerText = pool[i];

        box.classList.remove("zero","one","pop");
        void box.offsetWidth;

        if(pool[i] === 0) box.classList.add("zero");
        else box.classList.add("one");

        box.classList.add("pop");
    });
}

window.onload = generateRandom;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random</title>
    <style>
        /* RESET & NỀN TỐI TUYỆT ĐỐI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* QUY TẮC 3 CÁI MÉP: Trên 30px, Trái/Phải 3px */
            padding: 30px 3px 0 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TIÊU ĐỀ NEON */
        h2 {
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px rgba(0, 243, 255, 0.5);
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-align: center;
        }

        /* KHUNG CHỨA 6 Ô */
        .container {
            display: flex;
            gap: 6px;
            justify-content: center;
            width: 100%;
        }

        /* THIẾT KẾ Ô SỐ */
        .box {
            flex: 1;
            width: 50px;
            aspect-ratio: 1 / 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            background: #0a0a0a;
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #333;
        }

        /* NÚT BẤM RANDOM */
        .btn-random {
            width: 80%;
            max-width: 280px;
            padding: 18px 0;
            font-size: 22px;
            font-weight: bold;
            background: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            border-radius: 15px;
            cursor: pointer;
            display: block;
            margin: 25px auto;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            letter-spacing: 5px;
            transition: 0.2s;
        }

        .btn-random:active {
            transform: scale(0.95);
            background: #ffcc00;
            color: #000;
            box-shadow: 0 0 30px #ffcc00;
        }

        /* HIỆU ỨNG KHI CÓ KẾT QUẢ */
        .val-0 { 
            color: #00f3ff !important; 
            border-color: #00f3ff !important; 
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6), inset 0 0 8px rgba(0, 243, 255, 0.2); 
            text-shadow: 0 0 10px #00f3ff;
        }
        
        .val-1 { 
            color: #ff00ff !important; 
            border-color: #ff00ff !important; 
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6), inset 0 0 8px rgba(255, 0, 255, 0.2); 
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>

    <h2>Cyber Random 0-1</h2>
    
    <div class="container">
        <div class="box" id="box-0">-</div>
        <div class="box" id="box-1">-</div>
        <div class="box" id="box-2">-</div>
        <div class="box" id="box-3">-</div>
        <div class="box" id="box-4">-</div>
        <div class="box" id="box-5">-</div>
    </div>

    <button class="btn-random" onclick="generateRandom()">Random</button>

    <script>
        let lastResult = "";

        // Hàm kiểm tra các điều kiện
        function isValid(arr) {
            let hasTriple = false;
            let hasDouble = false;

            for (let i = 0; i < arr.length - 1; i++) {
                // Kiểm tra xem có ít nhất 2 số giống nhau cạnh nhau không
                if (arr[i] === arr[i+1]) {
                    hasDouble = true;
                }
                // Kiểm tra xem có 3 số giống nhau cạnh nhau không
                if (i < arr.length - 2) {
                    if (arr[i] === arr[i+1] && arr[i] === arr[i+2]) {
                        hasTriple = true;
                    }
                }
            }
            // Hợp lệ khi: CÓ ít nhất 1 cặp (Double) VÀ KHÔNG CÓ bộ ba (Triple)
            return hasDouble && !hasTriple;
        }

        function getAllValidPatterns() {
            const results = [];
            const nums = [0, 0, 0, 1, 1, 1];
            function permute(current, remaining) {
                if (remaining.length === 0) {
                    if (isValid(current)) results.push([...current]);
                    return;
                }
                let seen = new Set();
                for (let i = 0; i < remaining.length; i++) {
                    if (seen.has(remaining[i])) continue;
                    seen.add(remaining[i]);
                    current.push(remaining[i]);
                    let next = [...remaining];
                    next.splice(i, 1);
                    permute(current, next);
                    current.pop();
                }
            }
            permute([], nums);
            return results;
        }

        const validPatterns = getAllValidPatterns();

        function generateRandom() {
            let selectedPattern;
            let currentResultString;

            do {
                selectedPattern = validPatterns[Math.floor(Math.random() * validPatterns.length)];
                currentResultString = selectedPattern.join("");
            } while (currentResultString === lastResult);

            lastResult = currentResultString;

            for (let i = 0; i < 6; i++) {
                const box = document.getElementById(`box-${i}`);
                box.textContent = selectedPattern[i];
                box.className = 'box ' + (selectedPattern[i] === 0 ? 'val-0' : 'val-1');
            }
        }
    </script>
</body>
</html>

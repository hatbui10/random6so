<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Random 0-1 Dynamic Shuffle</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

input{
  width: 30%;
  height: 30px;
  padding: 5px;
  text-align: center;
  border-radius: 6px;
  border: none;
  margin: 10px auto;
  display: block;
  font-size:20px;
}

#spinCounter{
  margin:5px 0;
  font-size:18px;
}

#nextShuffle{
  margin-bottom:20px;
  font-size:14px;
  opacity:0.7;
}

.container{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.item{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.box{
  width:50px;
  height:50px;
  background:#222;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:bold;
  border:1px solid #444;
  transition:0.3s;
}

.ratio{
  margin-top:6px;
  font-size:13px;
  opacity:0.8;
}

.zero{
  background:#401515;
  color:#ff5555;
}

.one{
  background:#0f3d2e;
  color:#00ff88;
}

.blink{
  animation:blink 0.2s infinite alternate;
}

@keyframes blink{
  from{ transform:scale(1); opacity:1; }
  to{ transform:scale(1.15); opacity:0.5; }
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
  
  
  h1{
  font-size: 28px;
  text-align: center;
  color: #00ffcc;
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,255,200,0.6);
}
  
  
</style>
</head>

<body>
  <h1> Số lần quay để đổi tỷ lệ mới</h1>
<div>
  
  <input type="number" id="shuffleLimit" value="20" min="1">
  
</div>

<div id="spinCounter">Số lần quay: 0</div>
<div id="nextShuffle"></div>

<div class="container" id="container"></div>

<button onclick="startSpin()">Quay</button>

<script>

let ratios = [0.3, 0.6, 0.1, 0.4, 0.2];
let spinCount = 0;

function initUI(){
  const container = document.getElementById("container");
  container.innerHTML = "";

  for(let i=0;i<5;i++){
    container.innerHTML += `
      <div class="item">
        <div class="box" id="b${i+1}">0</div>
        <div class="ratio" id="r${i+1}"></div>
      </div>
    `;
  }

  updateRatioUI();
}

function updateRatioUI(){
  for(let i=0;i<5;i++){
    let zero = ratios[i]*100;
    document.getElementById("r"+(i+1)).textContent =
      zero.toFixed(0) + "% 0";
  }
}

function updateCounterUI(){

  let limit = parseInt(document.getElementById("shuffleLimit").value) || 1;

  document.getElementById("spinCounter").textContent =
    "Số lần quay: " + spinCount;

  let remaining = limit - (spinCount % limit);
  if(remaining === limit) remaining = 0;

  document.getElementById("nextShuffle").textContent =
    remaining === 0
    ? "Vừa đổi tỷ lệ!"
    : "Còn " + remaining + " lượt sẽ đổi tỷ lệ";
}

function shuffleArray(arr){
  for(let i = arr.length -1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function randomByRatio(percentZero){
  return Math.random() < percentZero ? 0 : 1;
}

function setBox(id, value){
  const el = document.getElementById(id);
  el.textContent = value;
  el.classList.remove("zero","one");
  el.classList.add(value === 0 ? "zero" : "one");
}

function startSpin(){

  let duration = 3000; 
  let startTime = Date.now();
  let delay = 50;

  function spin(){

    let elapsed = Date.now() - startTime;

    for(let i=1;i<=5;i++){
      setBox("b"+i, Math.random() < 0.5 ? 0 : 1);
    }

    if(elapsed < duration){
      delay += 15;
      setTimeout(spin, delay);
    }else{

      spinCount++;

      let limit = parseInt(document.getElementById("shuffleLimit").value) || 1;

      if(spinCount % limit === 0){
        shuffleArray(ratios);
        updateRatioUI();
      }

      updateCounterUI();

      for(let i=1;i<=5;i++){
        setBox("b"+i, randomByRatio(ratios[i-1]));
        document.getElementById("b"+i).classList.add("blink");
      }

      setTimeout(()=>{
        for(let i=1;i<=5;i++){
          document.getElementById("b"+i).classList.remove("blink");
        }
      },1000);
    }
  }

  spin();
}

initUI();
updateCounterUI();

</script>

</body>
</html>
